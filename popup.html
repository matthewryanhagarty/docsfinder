<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>docFinder</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 380px;
      max-height: 580px;
      overflow-y: auto;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      font-size: 13px;
    }

    /* scrollbar */
    body::-webkit-scrollbar { width: 4px; }
    body::-webkit-scrollbar-track { background: transparent; }
    body::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 2px; }

    /* ── Header ────────────────────────────────────────────────── */
    .header {
      padding: 14px 18px 12px;
      background: #0f172a;
      border-bottom: 1px solid #1e293b;
      display: flex;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-icon {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }
    .header-text h1 { font-size: 13px; font-weight: 600; color: #f1f5f9; letter-spacing: 0.2px; }
    .header-text .hostname {
      font-size: 11px; color: #64748b; margin-top: 1px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 275px;
    }

    /* ── Content ────────────────────────────────────────────────── */
    .content { padding: 14px; }

    /* ── Platform card ───────────────────────────────────────────── */
    .platform-card {
      background: #1e293b; border-radius: 10px; padding: 14px;
      border-left: 4px solid var(--color, #6366f1); margin-bottom: 10px;
    }
    .platform-category {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.8px; color: var(--color, #6366f1); margin-bottom: 4px;
    }
    .platform-name { font-size: 22px; font-weight: 700; color: #f8fafc; line-height: 1.2; }
    .confidence { margin-top: 10px; }
    .confidence-label { font-size: 11px; color: #94a3b8; margin-bottom: 5px; }
    .confidence-bar { height: 4px; background: #334155; border-radius: 2px; overflow: hidden; }
    .confidence-fill { height: 100%; background: var(--color, #6366f1); border-radius: 2px; }
    .signals-list { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
    .signal-chip {
      font-size: 10px; font-weight: 500; padding: 3px 8px; border-radius: 20px;
      background: color-mix(in srgb, var(--color, #6366f1) 15%, transparent);
      color: color-mix(in srgb, var(--color, #6366f1) 80%, white);
      border: 1px solid color-mix(in srgb, var(--color, #6366f1) 25%, transparent);
    }

    /* ── Other platforms ─────────────────────────────────────────── */
    .section-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.8px; color: #334155; margin: 12px 0 7px; padding: 0 2px;
    }
    .other-card {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 10px; background: #1e293b; border-radius: 7px;
      margin-bottom: 5px; border-left: 3px solid var(--color, #475569);
    }
    .other-name { font-weight: 600; font-size: 12px; color: #e2e8f0; }
    .other-signals {
      font-size: 10px; color: #64748b; background: #0f172a;
      padding: 2px 7px; border-radius: 10px;
    }

    /* ── Competitor intel card ───────────────────────────────────── */
    .intel-card {
      background: #1e293b; border-radius: 10px;
      overflow: hidden; margin-bottom: 10px;
    }
    .intel-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 14px 9px;
      background: color-mix(in srgb, #f59e0b 8%, #1e293b);
      border-bottom: 1px solid color-mix(in srgb, #f59e0b 15%, transparent);
    }
    .intel-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: #f59e0b; }
    .intel-tagline {
      padding: 9px 14px 8px; font-size: 11px; color: #64748b;
      font-style: italic; border-bottom: 1px solid #0f172a;
    }
    .intel-gaps { padding: 10px 14px; border-bottom: 1px solid #0f172a; }
    .intel-gap {
      display: flex; align-items: flex-start; gap: 8px;
      font-size: 11px; color: #e2e8f0; line-height: 1.5; margin-bottom: 6px;
    }
    .intel-gap:last-child { margin-bottom: 0; }
    .intel-gap-dot { color: #f59e0b; flex-shrink: 0; margin-top: 2px; font-size: 9px; }
    .switchers-row { padding: 8px 14px 10px; }
    .switchers-label {
      font-size: 10px; color: #475569; margin-bottom: 6px;
      font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .switchers-chips { display: flex; flex-wrap: wrap; gap: 4px; }
    .switcher-chip {
      font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px;
      background: #0f172a; color: #94a3b8; border: 1px solid #1e293b;
    }

    /* ── Live analysis card ──────────────────────────────────────── */
    .analysis-card {
      background: #1e293b; border-radius: 10px;
      overflow: hidden; margin-bottom: 10px;
    }
    .analysis-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 14px 9px;
      background: color-mix(in srgb, #6366f1 8%, #1e293b);
      border-bottom: 1px solid color-mix(in srgb, #6366f1 15%, transparent);
    }
    .analysis-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: #818cf8; }
    .analysis-score {
      font-size: 10px; font-weight: 600; color: #f59e0b;
      background: color-mix(in srgb, #f59e0b 10%, transparent);
      padding: 2px 7px; border-radius: 10px;
    }
    .analysis-group { padding: 10px 14px; border-bottom: 1px solid #0f172a; }
    .analysis-group:last-child { border-bottom: none; }
    .analysis-group-title {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.6px; color: #475569; margin-bottom: 8px;
    }
    .check-item {
      display: flex; align-items: flex-start; gap: 8px;
      font-size: 11px; line-height: 1.5; margin-bottom: 6px;
    }
    .check-item:last-child { margin-bottom: 0; }
    .check-icon {
      flex-shrink: 0; width: 14px; height: 14px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 700; margin-top: 1px;
    }
    .check-item.gap  .check-icon { background: color-mix(in srgb, #f59e0b 20%, transparent); color: #f59e0b; }
    .check-item.ok   .check-icon { background: color-mix(in srgb, #22c55e 20%, transparent); color: #22c55e; }
    .check-item.info .check-icon { background: color-mix(in srgb, #818cf8 20%, transparent); color: #818cf8; font-style: italic; font-size: 10px; font-weight: 700; }
    .check-item.gap  { color: #e2e8f0; }
    .check-item.ok   { color: #64748b; }
    .check-item.info { color: #94a3b8; }
    .check-item strong { font-weight: 600; color: inherit; }

    /* ── Discovery questions ─────────────────────────────────────── */
    .questions-card {
      background: #1e293b; border-radius: 10px;
      overflow: hidden; margin-bottom: 10px;
    }
    .questions-header {
      padding: 10px 14px 9px;
      background: color-mix(in srgb, #8b5cf6 8%, #1e293b);
      border-bottom: 1px solid color-mix(in srgb, #8b5cf6 15%, transparent);
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.8px; color: #a78bfa;
    }
    .question-item {
      padding: 9px 14px; border-bottom: 1px solid #0f172a;
      font-size: 11px; color: #94a3b8; line-height: 1.5; font-style: italic;
    }
    .question-item:last-child { border-bottom: none; }
    .q-mark { color: #a78bfa; font-style: normal; font-size: 13px; margin-right: 2px; }

    /* ── Mintlify success ────────────────────────────────────────── */
    .mintlify-success { text-align: center; padding: 24px 16px 20px; }
    .mintlify-success-icon { font-size: 36px; margin-bottom: 10px; }
    .mintlify-success-title { font-size: 16px; font-weight: 700; color: #22c55e; margin-bottom: 6px; }
    .mintlify-success-sub { font-size: 11px; color: #475569; line-height: 1.5; }
    .mintlify-signals { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; margin-top: 12px; }

    /* ── No result / homegrown ───────────────────────────────────── */
    .no-result { text-align: center; padding: 20px 16px; }
    .no-result-icon { font-size: 32px; margin-bottom: 10px; }
    .no-result-title { font-size: 14px; font-weight: 600; color: #e2e8f0; margin-bottom: 6px; }
    .no-result-sub { font-size: 11px; color: #475569; line-height: 1.5; margin-bottom: 12px; }
    .homegrown-badge {
      display: inline-block; padding: 5px 14px; background: #1e293b;
      border: 1px solid #334155; border-radius: 20px;
      font-size: 11px; color: #94a3b8; font-weight: 500;
    }
    .tech-badge {
      display: inline-block; margin-left: 6px; padding: 5px 14px; background: #1e293b;
      border: 1px solid color-mix(in srgb, #818cf8 30%, transparent); border-radius: 20px;
      font-size: 11px; color: #818cf8; font-weight: 500;
    }

    /* ── Loading / Error ─────────────────────────────────────────── */
    .loading { text-align: center; padding: 28px 16px; }
    .spinner {
      width: 20px; height: 20px; border: 2px solid #1e293b;
      border-top-color: #6366f1; border-radius: 50%;
      animation: spin 0.7s linear infinite; margin: 0 auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 12px; color: #475569; }
    .error {
      padding: 16px; background: #1e293b;
      border-radius: 8px; border-left: 3px solid #ef4444;
    }
    .error strong { color: #fca5a5; display: block; margin-bottom: 4px; font-size: 12px; }
    .error span { color: #64748b; font-size: 11px; }

    /* ── Agentic Score ───────────────────────────────────────────── */
    .agentic-card {
      background: #1e293b; border-radius: 10px;
      overflow: hidden; margin-bottom: 10px;
    }
    .agentic-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 14px 9px;
      background: color-mix(in srgb, #06b6d4 8%, #1e293b);
      border-bottom: 1px solid color-mix(in srgb, #06b6d4 15%, transparent);
    }
    .agentic-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: #22d3ee; }
    .agentic-grade {
      font-size: 17px; font-weight: 800; line-height: 1;
      padding: 3px 10px; border-radius: 7px;
      background: color-mix(in srgb, var(--grade-color, #22d3ee) 15%, transparent);
      color: var(--grade-color, #22d3ee);
      border: 1px solid color-mix(in srgb, var(--grade-color, #22d3ee) 30%, transparent);
    }
    .agentic-score-row {
      padding: 10px 14px; border-bottom: 1px solid #0f172a;
      display: flex; align-items: center; gap: 10px;
    }
    .agentic-score-num { font-size: 22px; font-weight: 700; color: #f8fafc; flex-shrink: 0; }
    .agentic-score-sub { font-size: 10px; color: #64748b; line-height: 1.4; margin-top: 4px; }
    .agentic-bar { height: 6px; background: #334155; border-radius: 3px; overflow: hidden; }
    .agentic-bar-fill { height: 100%; border-radius: 3px; background: var(--grade-color, #22d3ee); }
    .agentic-group { padding: 8px 14px; border-bottom: 1px solid #0f172a; }
    .agentic-group:last-child { border-bottom: none; }
    .agentic-group-title {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.6px; color: #475569; margin-bottom: 6px;
    }

    /* ── Footer ──────────────────────────────────────────────────── */
    .footer {
      padding: 8px 14px; border-top: 1px solid #1e293b;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; bottom: 0; background: #0f172a;
    }
    .scan-btn {
      font-size: 11px; font-weight: 500; color: #94a3b8; background: #1e293b;
      border: 1px solid #334155; border-radius: 6px; padding: 5px 12px;
      cursor: pointer; transition: all 0.15s;
    }
    .scan-btn:hover { background: #334155; color: #e2e8f0; }
    .footer-label { font-size: 10px; color: #334155; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">🔍</div>
    <div class="header-text">
      <h1>docFinder</h1>
      <div class="hostname" id="current-hostname">Loading...</div>
    </div>
  </div>

  <div class="content" id="results">
    <div class="loading">
      <div class="spinner"></div>
      <div class="loading-text">Scanning page...</div>
    </div>
  </div>

  <div class="footer">
    <button class="scan-btn" id="rescan-btn">↺ Rescan</button>
    <span class="footer-label">docFinder v1.0</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
