<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>docFinder</title>
  <style>
    :root {
      --bg:         #ffffff;
      --bg-card:    #f8fafc;
      --bg-header:  #ffffff;
      --border:     #e2e8f0;
      --text-1:     #0f172a;
      --text-2:     #475569;
      --text-3:     #94a3b8;
      --accent:     #16a34a;
      --accent-bg:  #f0fdf4;
      --accent-dim: #bbf7d0;
      --ok:         #16a34a;
      --gap:        #dc2626;
      --info:       #6366f1;
    }
    [data-theme="dark"] {
      --bg:         #0f172a;
      --bg-card:    #1e293b;
      --bg-header:  #0b1120;
      --border:     #253346;
      --text-1:     #f1f5f9;
      --text-2:     #94a3b8;
      --text-3:     #475569;
      --accent:     #22c55e;
      --accent-bg:  color-mix(in srgb, #22c55e 10%, #1e293b);
      --accent-dim: color-mix(in srgb, #22c55e 25%, #1e293b);
      --ok:         #22c55e;
      --gap:        #f87171;
      --info:       #818cf8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 380px; max-height: 580px; overflow-y: auto;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--text-1); font-size: 13px;
    }
    body::-webkit-scrollbar { width: 4px; }
    body::-webkit-scrollbar-track { background: transparent; }
    body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Header ─────────────────────────────────────────────────── */
    .header {
      padding: 11px 14px; background: var(--bg-header);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 9px;
      position: sticky; top: 0; z-index: 10;
    }
    .header-icon {
      width: 26px; height: 26px; background: var(--accent);
      border-radius: 7px; display: flex; align-items: center;
      justify-content: center; font-size: 13px; flex-shrink: 0;
    }
    .header-text { flex: 1; min-width: 0; }
    .header-text h1 { font-size: 13px; font-weight: 700; color: var(--text-1); }
    .header-text .hostname {
      font-size: 11px; color: var(--text-3); margin-top: 1px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .theme-btn {
      background: none; border: 1px solid var(--border); border-radius: 6px;
      padding: 4px 7px; cursor: pointer; font-size: 13px; flex-shrink: 0;
      transition: border-color 0.15s; line-height: 1;
    }
    .theme-btn:hover { border-color: var(--accent); }

    /* ── Content ────────────────────────────────────────────────── */
    .content { padding: 14px; }

    /* ── Platform card ──────────────────────────────────────────── */
    .platform-card {
      background: var(--bg-card); border-radius: 10px; padding: 14px;
      border: 1px solid var(--border);
      border-left: 4px solid var(--color, var(--accent)); margin-bottom: 10px;
    }
    .platform-category {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.8px; color: var(--color, var(--accent)); margin-bottom: 4px;
    }
    .platform-name { font-size: 22px; font-weight: 700; color: var(--text-1); line-height: 1.2; }
    .confidence { margin-top: 10px; }
    .confidence-label { font-size: 11px; color: var(--text-2); margin-bottom: 5px; }
    .confidence-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .confidence-fill { height: 100%; background: var(--color, var(--accent)); border-radius: 2px; }
    .signals-list { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
    .signal-chip {
      font-size: 10px; font-weight: 500; padding: 3px 8px; border-radius: 20px;
      background: color-mix(in srgb, var(--color, var(--accent)) 10%, var(--bg-card));
      color: var(--color, var(--accent));
      border: 1px solid color-mix(in srgb, var(--color, var(--accent)) 20%, var(--border));
    }

    /* ── Other platforms ────────────────────────────────────────── */
    .section-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.8px; color: var(--text-3); margin: 12px 0 7px;
    }
    .other-card {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 10px; background: var(--bg-card); border-radius: 7px;
      margin-bottom: 5px; border: 1px solid var(--border);
      border-left: 3px solid var(--color, var(--text-3));
    }
    .other-name { font-weight: 600; font-size: 12px; color: var(--text-1); }
    .other-signals {
      font-size: 10px; color: var(--text-3); background: var(--bg);
      padding: 2px 7px; border-radius: 10px; border: 1px solid var(--border);
    }

    /* ── Summary card ───────────────────────────────────────────── */
    .summary-card {
      background: var(--accent-bg); border-radius: 10px; padding: 12px 14px;
      border: 1px solid var(--accent-dim); margin-bottom: 10px; position: relative;
    }
    .summary-title {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.8px; color: var(--accent); margin-bottom: 8px;
    }
    .summary-text {
      font-size: 11px; color: var(--text-2); line-height: 1.65; white-space: pre-wrap;
      padding-right: 50px;
    }
    .copy-btn {
      position: absolute; top: 10px; right: 12px;
      font-size: 10px; font-weight: 600; color: var(--accent);
      background: none; border: 1px solid var(--accent-dim); border-radius: 5px;
      padding: 3px 9px; cursor: pointer; transition: all 0.15s;
    }
    .copy-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ── Analysis / Opportunity card ────────────────────────────── */
    .analysis-card {
      background: var(--bg-card); border-radius: 10px;
      border: 1px solid var(--border); overflow: hidden; margin-bottom: 10px;
    }
    .analysis-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 14px 9px; border-bottom: 1px solid var(--border);
    }
    .analysis-title {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.8px; color: var(--text-2);
    }
    .analysis-score {
      font-size: 10px; font-weight: 600; color: var(--gap);
      background: color-mix(in srgb, var(--gap) 10%, var(--bg-card));
      padding: 2px 7px; border-radius: 10px;
      border: 1px solid color-mix(in srgb, var(--gap) 20%, var(--border));
    }
    .analysis-group { padding: 10px 14px; border-bottom: 1px solid var(--border); }
    .analysis-group:last-child { border-bottom: none; }
    .analysis-group-title {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.6px; color: var(--text-3); margin-bottom: 8px;
    }
    .check-item {
      display: flex; align-items: flex-start; gap: 8px;
      font-size: 11px; line-height: 1.5; margin-bottom: 6px;
    }
    .check-item:last-child { margin-bottom: 0; }
    .check-icon {
      flex-shrink: 0; width: 14px; height: 14px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 700; margin-top: 1px;
    }
    .check-item.gap  .check-icon { background: color-mix(in srgb, var(--gap)  15%, var(--bg-card)); color: var(--gap); }
    .check-item.ok   .check-icon { background: color-mix(in srgb, var(--ok)   15%, var(--bg-card)); color: var(--ok); }
    .check-item.info .check-icon { background: color-mix(in srgb, var(--info) 15%, var(--bg-card)); color: var(--info); font-style: italic; font-size: 10px; }
    .check-item.gap  { color: var(--text-1); }
    .check-item.ok   { color: var(--text-2); }
    .check-item.info { color: var(--text-2); }
    .check-item strong { font-weight: 600; color: inherit; }

    /* ── Mintlify success ───────────────────────────────────────── */
    .mintlify-success { text-align: center; padding: 24px 16px 20px; }
    .mintlify-success-icon { font-size: 36px; margin-bottom: 10px; }
    .mintlify-success-title { font-size: 16px; font-weight: 700; color: var(--accent); margin-bottom: 6px; }
    .mintlify-success-sub { font-size: 11px; color: var(--text-2); line-height: 1.5; }
    .mintlify-signals { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; margin-top: 12px; }

    /* ── No result / homegrown ──────────────────────────────────── */
    .no-result { text-align: center; padding: 20px 16px; }
    .no-result-icon { font-size: 32px; margin-bottom: 10px; }
    .no-result-title { font-size: 14px; font-weight: 600; color: var(--text-1); margin-bottom: 6px; }
    .no-result-sub { font-size: 11px; color: var(--text-2); line-height: 1.5; margin-bottom: 12px; }
    .homegrown-badge {
      display: inline-block; padding: 4px 12px; background: var(--bg-card);
      border: 1px solid var(--border); border-radius: 20px;
      font-size: 11px; color: var(--text-2); font-weight: 500;
    }
    .tech-badge {
      display: inline-block; margin-left: 6px; padding: 4px 12px;
      background: color-mix(in srgb, var(--info) 8%, var(--bg-card));
      border: 1px solid color-mix(in srgb, var(--info) 20%, var(--border));
      border-radius: 20px; font-size: 11px; color: var(--info); font-weight: 500;
    }

    /* ── Loading / Error ────────────────────────────────────────── */
    .loading { text-align: center; padding: 28px 16px; }
    .spinner {
      width: 20px; height: 20px; border: 2px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.7s linear infinite; margin: 0 auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 12px; color: var(--text-3); }
    .error {
      padding: 14px; background: var(--bg-card); border-radius: 8px;
      border: 1px solid var(--border); border-left: 3px solid var(--gap);
    }
    .error strong { color: var(--gap); display: block; margin-bottom: 4px; font-size: 12px; }
    .error span { color: var(--text-2); font-size: 11px; }

    /* ── Agentic Score ──────────────────────────────────────────── */
    .agentic-card {
      background: var(--bg-card); border-radius: 10px;
      border: 1px solid var(--border); overflow: hidden; margin-bottom: 10px;
    }
    .agentic-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 14px 9px; border-bottom: 1px solid var(--border);
    }
    .agentic-title {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.8px; color: var(--text-2);
    }
    .agentic-grade {
      font-size: 17px; font-weight: 800; line-height: 1;
      padding: 3px 10px; border-radius: 7px;
      background: color-mix(in srgb, var(--grade-color, var(--accent)) 12%, var(--bg-card));
      color: var(--grade-color, var(--accent));
      border: 1px solid color-mix(in srgb, var(--grade-color, var(--accent)) 25%, var(--border));
    }
    .agentic-score-row {
      padding: 10px 14px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .agentic-score-num { font-size: 22px; font-weight: 700; color: var(--text-1); flex-shrink: 0; }
    .agentic-score-sub { font-size: 10px; color: var(--text-3); line-height: 1.4; margin-top: 4px; }
    .agentic-bar { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .agentic-bar-fill { height: 100%; border-radius: 3px; background: var(--grade-color, var(--accent)); }
    .agentic-group { padding: 8px 14px; border-bottom: 1px solid var(--border); }
    .agentic-group:last-child { border-bottom: none; }
    .agentic-group-title {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.6px; color: var(--text-3); margin-bottom: 6px;
    }

    /* ── Footer ─────────────────────────────────────────────────── */
    .footer {
      padding: 8px 14px; border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; bottom: 0; background: var(--bg-header);
    }
    .scan-btn {
      font-size: 11px; font-weight: 500; color: var(--text-2);
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 6px; padding: 5px 12px; cursor: pointer; transition: all 0.15s;
    }
    .scan-btn:hover { border-color: var(--accent); color: var(--accent); }
    .footer-label { font-size: 10px; color: var(--text-3); }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">🔍</div>
    <div class="header-text">
      <h1>docFinder</h1>
      <div class="hostname" id="current-hostname">Loading...</div>
    </div>
    <button class="theme-btn" id="theme-btn" title="Toggle dark mode">🌙</button>
  </div>

  <div class="content" id="results">
    <div class="loading">
      <div class="spinner"></div>
      <div class="loading-text">Scanning page...</div>
    </div>
  </div>

  <div class="footer">
    <button class="scan-btn" id="rescan-btn">↺ Rescan</button>
    <span class="footer-label">docFinder</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
